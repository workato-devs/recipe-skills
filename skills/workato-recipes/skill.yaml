# Workato Recipes Base Skill
# Foundation knowledge for writing Workato recipe JSON - trigger types,
# control flow, datapill syntax, and recipe structure fundamentals.

name: workato-recipes
version: 1.0.0
description: >
  Base skill for Workato recipe development. Provides foundational knowledge
  for recipe JSON structure, trigger types, control flow patterns, and datapill
  syntax. Connector-specific skills (stripe-recipes, salesforce-recipes, etc.)
  extend this base skill.

author: Workato
license: MIT

# Capabilities this skill provides
capabilities:
  - Recipe JSON structure (name, version, config, code)
  - Trigger types (API endpoint, callable recipe, webhook, scheduler)
  - Control flow (if/else, try/catch, loops)
  - Datapill syntax and references
  - Config section and connection definitions
  - Return/response handling
  - Adhoc HTTP actions (direct API calls)
  - Custom connector actions (Connector SDK)

# Entry point for agent consumption
entry_point: SKILL.md

# Trigger documentation
triggers:
  - triggers/api-endpoint.md
  - triggers/callable-recipe.md
  - triggers/data-table.md
  - triggers/genie-skill.md

# Control flow documentation
control_flow:
  - control-flow/if-else.md
  - control-flow/try-catch.md
  - control-flow/foreach.md

# Fundamentals
fundamentals:
  - fundamentals/recipe-structure.md
  - fundamentals/datapill-syntax.md
  - fundamentals/config-section.md

# Templates
templates:
  - templates/api-endpoint-trigger.template.json
  - templates/api-endpoint-complete.template.json
  - templates/callable-recipe-complete.template.json
  - templates/control-flow-examples.template.json

# Patterns
patterns:
  - patterns/adhoc-http-actions.md
  - patterns/custom-connector-actions.md
  - patterns/api-platform-artifacts.md
  - patterns/variables-and-lists.md
  - patterns/python-snippets.md

# Validation checklist
validation:
  - validation-checklist.md

# Target platforms
platforms:
  - workato

# Tags for discovery
tags:
  - workato
  - recipes
  - integration
  - automation
  - triggers
